<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumora</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header>

    <div class="left">

        <div class="brand">
            <div class="logo">LOGO</div>
            <span class="brand-name">LUMORA</span>
        </div>

        <nav class="menu">
            <a href="#">Início</a>
            <a href="#">Séries</a>
            <a href="#">Filmes</a>
            <a href="#">Minha Lista</a>
        </nav>

    </div>

    <div class="icons">
        <div class="icon">🔍</div>
        <div class="icon">👤</div>
    </div>

</header>

<!-- BANNER DESTAQUE -->
 <section class="banner">
    <div class="banner-conteudo">
        <h1>Nome do Filme</h1>
        <p>
            Uma breve descrição do conteúdo em destaque aparece aqui.
        </p>

        <div class="botoes">
            <button class="btn-play">▶ Assistir</button>
            <button class="btn-info">Mais informações Ⓘ</button>
        </div>
    </div>
</section>

<!-- CONTINUE ASSISTINDO -->
 <section class="categoria">
    <h2>Continue assistindo</h2>

    <div class="lista-filmes">

        <div class="filme">
            <img src="https://picsum.photos/200/300?random=1" alt="Filme">
        </div>
        <div class="filme">
            <img src="https://picsum.photos/200/300?random=2" alt="Filme">
        </div>
        <div class="filme">
            <img src="https://picsum.photos/200/300?random=3" alt="Filme">
        </div>
        <div class="filme">
            <img src="https://picsum.photos/200/300?random=4" alt="Filme">
        </div>
        <div class="filme">
            <img src="https://picsum.photos/200/300?random=5" alt="Filme">
        </div>
        <div class="filme">
            <img src="https://picsum.photos/200/300?random=6" alt="Filme">
        </div>
        <div class="filme">
            <img src="https://picsum.photos/200/300?random=7" alt="Filme">
        </div>


    </div>
</section>

<!-- FOOTER -->
 <footer>
    <p>© 2026 - Lumora</p>

    <nav class="footer-links">
        <a href="#">Sobre</a>
        <a href="#">Ajuda</a>
        <a href="#">Termos de Uso</a>
        <a href="#">Privacidade</a>
    </nav>
</footer>

</body>
</html>
